spring:
  application:
    name: "help-desk-backend"
    #datasource config
  datasource:
    url: jdbc:mysql://localhost:3306/spring_ai?useSSL=false&serverTimezone=UTC
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.mistral.ai
      chat:
        options:
          model: mistral-small



    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: 8081

#database configuration
logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG


